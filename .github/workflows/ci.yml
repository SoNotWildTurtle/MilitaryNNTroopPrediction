name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-core.txt

      - name: Prepare diagnostic artifact directory
        run: mkdir -p ci_artifacts

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run setup diagnostics
        run: make doctor ARTIFACT_DIR=ci_artifacts

      - name: Run release health smoke check
        run: |
          python -m app.cli.release_health \
            --markdown-path /tmp/militarynntroopprediction-release-health.md \
            --json-path /tmp/militarynntroopprediction-release-health.json

      - name: Export OpenAPI smoke artifact
        run: |
          python -m app.cli.export_openapi \
            --json-path /tmp/militarynntroopprediction-openapi.json \
            --markdown-path /tmp/militarynntroopprediction-openapi.md

      - name: Export API example smoke artifact
        run: |
          python -m app.cli.export_api_examples \
            --json-path /tmp/militarynntroopprediction-api-response-examples.json \
            --markdown-path /tmp/militarynntroopprediction-api-response-examples.md

      - name: Export dashboard smoke artifact
        run: |
          python -m app.cli.export_dashboard_mockup \
            --html-path /tmp/militarynntroopprediction-dashboard-mockup.html

      - name: Export release bundle index smoke artifact
        run: |
          python -m app.cli.release_bundle_index \
            --artifact-dir /tmp \
            --html-path /tmp/militarynntroopprediction-release-bundle-index.html

      - name: Export HTML previews smoke artifact
        run: |
          python -m app.cli.export_html_previews \
            --artifact-dir /tmp \
            --output-dir /tmp/militarynntroopprediction-html-previews \
            --markdown-path /tmp/militarynntroopprediction-html-previews.md

      - name: Export artifact manifest smoke artifact
        run: |
          python -m app.cli.artifact_manifest \
            --artifact-dir /tmp \
            --json-path /tmp/militarynntroopprediction-artifact-manifest.json \
            --markdown-path /tmp/militarynntroopprediction-artifact-manifest.md

      - name: Export release notes smoke artifact
        run: |
          python -m app.cli.release_notes \
            --health-json /tmp/militarynntroopprediction-release-health.json \
            --manifest-json /tmp/militarynntroopprediction-artifact-manifest.json \
            --markdown-path /tmp/militarynntroopprediction-release-notes.md \
            --json-path /tmp/militarynntroopprediction-release-notes.json

      - name: Export triage summary smoke artifact
        run: |
          python -m app.cli.triage_summary \
            --artifact-dir /tmp \
            --health-json /tmp/militarynntroopprediction-release-health.json \
            --manifest-json /tmp/militarynntroopprediction-artifact-manifest.json \
            --markdown-path /tmp/militarynntroopprediction-triage-summary.md \
            --json-path /tmp/militarynntroopprediction-triage-summary.json

      - name: Export reviewer handoff smoke artifact
        run: |
          python -m app.cli.reviewer_handoff \
            --artifact-dir /tmp \
            --markdown-path /tmp/militarynntroopprediction-reviewer-handoff.md \
            --json-path /tmp/militarynntroopprediction-reviewer-handoff.json

      - name: Export operator readiness smoke artifact
        run: |
          python -m app.cli.operator_readiness \
            --artifact-dir /tmp \
            --health-json /tmp/militarynntroopprediction-release-health.json \
            --manifest-json /tmp/militarynntroopprediction-artifact-manifest.json \
            --triage-json /tmp/militarynntroopprediction-triage-summary.json \
            --markdown-path /tmp/militarynntroopprediction-operator-readiness.md \
            --json-path /tmp/militarynntroopprediction-operator-readiness.json

      - name: Export uncertainty review packet smoke artifact
        run: |
          python -m app.cli.uncertainty_review_packet \
            --artifact-dir /tmp \
            --operator-plan-json /tmp/militarynntroopprediction-operator-next-steps.json \
            --health-json /tmp/militarynntroopprediction-release-health.json \
            --manifest-json /tmp/militarynntroopprediction-artifact-manifest.json \
            --markdown-path /tmp/militarynntroopprediction-uncertainty-review-packet.md \
            --json-path /tmp/militarynntroopprediction-uncertainty-review-packet.json

      - name: Export handoff integrity smoke artifact
        run: |
          python -m app.cli.handoff_integrity_report \
            --artifact-dir /tmp \
            --health-json /tmp/militarynntroopprediction-release-health.json \
            --manifest-json /tmp/militarynntroopprediction-artifact-manifest.json \
            --reviewer-handoff-json /tmp/militarynntroopprediction-reviewer-handoff.json \
            --operator-next-steps-json /tmp/militarynntroopprediction-operator-next-steps.json \
            --uncertainty-json /tmp/militarynntroopprediction-uncertainty-review-packet.json \
            --markdown-path /tmp/militarynntroopprediction-handoff-integrity-report.md \
            --json-path /tmp/militarynntroopprediction-handoff-integrity-report.json

      - name: Export evidence checklist smoke artifact
        run: |
          python -m app.cli.evidence_checklist \
            --artifact-dir /tmp \
            --markdown-path /tmp/militarynntroopprediction-evidence-checklist.md \
            --json-path /tmp/militarynntroopprediction-evidence-checklist.json

      - name: Export provenance validation matrix smoke artifact
        run: |
          python -m app.cli.provenance_validation_matrix \
            --artifact-dir /tmp \
            --markdown-path /tmp/militarynntroopprediction-provenance-validation-matrix.md \
            --json-path /tmp/militarynntroopprediction-provenance-validation-matrix.json

      - name: Validate reviewer handoff smoke artifact
        run: |
          python scripts/validate_reviewer_handoff.py \
            /tmp/militarynntroopprediction-reviewer-handoff.json \
            --json

      - name: Run operator readiness unit tests
        run: python -m unittest tests.test_operator_readiness

      - name: Run full unit test discovery
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build diagnostic bundle
        if: always()
        run: make ci-report ARTIFACT_DIR=ci_artifacts

      - name: Validate reviewer handoff contract
        run: make validate-handoff ARTIFACT_DIR=ci_artifacts

      - name: Upload diagnostic artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: ci_artifacts/
          if-no-files-found: error
