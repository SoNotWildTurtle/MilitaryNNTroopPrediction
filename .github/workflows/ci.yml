name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-core.txt

      - name: Run unified verification
        run: make verify ARTIFACT_DIR=ci_artifacts

      - name: Upload diagnostic artifact bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: ci_artifacts/
          if-no-files-found: error
