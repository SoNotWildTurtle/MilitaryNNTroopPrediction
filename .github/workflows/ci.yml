name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pymongo pillow uvicorn

      - name: Compile Python modules
        run: python -m compileall app tests

      - name: Run setup doctor smoke check
        run: python -m app.cli.doctor --skip-optional --skip-mongo --json

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
