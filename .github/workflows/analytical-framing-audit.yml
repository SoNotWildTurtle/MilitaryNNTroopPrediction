name: Analytical Framing Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  framing-audit:
    name: Safe-scope wording audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-core.txt

      - name: Compile audit module and tests
        run: python -m compileall app tests

      - name: Seed synthetic diagnostic artifacts
        run: |
          mkdir -p ci_artifacts/framing-audit-seed
          cat > ci_artifacts/framing-audit-seed/scope-note.md <<'EOF'
          # Analytical scope note

          These generated diagnostics are analytical estimates for lawful defensive review.
          They use synthetic examples where needed and must not be treated as operational certainty.
          EOF

      - name: Run analytical framing audit unit tests
        run: python -m unittest tests.test_analytical_framing_audit

      - name: Export analytical framing audit smoke artifacts
        run: |
          python -m app.cli.analytical_framing_audit \
            --artifact-dir ci_artifacts \
            --markdown-path ci_artifacts/analytical-framing-audit.md \
            --json-path ci_artifacts/analytical-framing-audit.json

      - name: Assert audit artifacts exist
        run: |
          test -s ci_artifacts/analytical-framing-audit.md
          test -s ci_artifacts/analytical-framing-audit.json

      - name: Upload framing audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytical-framing-audit
          path: ci_artifacts/
          if-no-files-found: error
